<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {

}
.layout { display: flex; min-height: 100vh; }

}

.main-content { margin-left: 230px; flex: 1; padding: 72px 52px 44px; max-width: 860px; }

.avatar { width: 30px; height: 30px; border-radius: 50%; background: var(--rose-dark);

.user-email { font-size: 11.5px; color: var(--ink); overflow: hidden;

.user-sub { font-size: 10.5px; color: var(--ink-lt); cursor: pointer; margin-top: 2px; }
.record-count { font-size: 10.5px; color: var(--mist); margin-top: 10px; }

/* Page heading */
.page-title { font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 300;
  color: var(--ink); letter-spacing: 0.01em; line-height: 1.15; }
.page-sub { font-size: 13px; color: var(--ink-lt); font-weight: 300;

.card { background: var(--white); border: 1px solid var(--border); border-radius: 12px;
  padding: 28px 32px; margin-bottom: 20px; box-shadow: var(--shadow); }
.card-title { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500;
  color: var(--ink); margin-bottom: 18px; letter-spacing: 0.02em;

.dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rose); flex-shrink: 0; }

/* Form */
.form-grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.form-grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 16px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }

  color: var(--ink); background: var(--cream); outline: none;

}
input:focus, select:focus, textarea:focus { border-color: var(--rose); background: var(--white); }
input::placeholder, textarea::placeholder { color: var(--mist); }
textarea { resize: vertical; line-height: 1.75; font-family: 'DM Sans', sans-serif; }

.btn-danger:hover { background: rgba(184,122,122,0.08); }
.btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none !important; box-shadow: none !important; }
.btn-row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; margin-top: 18px; }

.stat-box { background: var(--white); border: 1px solid var(--border);

/* Interview list */
.interview-list { display: flex; flex-direction: column; gap: 12px; }
.interview-card { background: var(--white); border: 1px solid var(--border);

.interview-card:hover { border-color: var(--rose); transform: translateY(-1px); box-shadow: var(--shadow-md); }
.interview-card.selected { border-color: var(--rose); background: rgba(201,169,154,0.04); }
.ic-company { font-family: 'Cormorant Garamond', serif; font-size: 18px; font-weight: 500; color: var(--ink); }

.tag-slate { background: rgba(122,143,166,0.18); color: var(--slate-dk); }
.score-chip { font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 500; }

.score-md { background: rgba(201,169,154,0.18); color: var(--rose-dark); }

.detail-text { font-size: 13px; color: var(--ink-lt); line-height: 1.8; white-space: pre-wrap; }

/* Empty & toast */
.empty-state { text-align: center; padding: 56px 24px; color: var(--mist);
  font-family: 'Cormorant Garamond', serif; font-size: 18px; font-style: italic; }
.loading-dots span { display: inline-block; width: 5px; height: 5px; border-radius: 50%;
  background: var(--rose); margin: 0 2px; animation: bounce 1.2s infinite ease-in-out; }
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }
.toast { position: fixed; bottom: 28px; right: 28px; background: var(--ink);

hr.divider { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.auth-panel { width: 100%; max-width: 420px; background: var(--white);

.auth-tabs button { flex: 1; border: none; background: transparent;

.auth-oauth { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.auth-note { font-size: 10.5px; color: var(--mist); text-align: center; margin-top: 24px; line-height: 1.7; }

/* Filter buttons */
.filter-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.filter-btn { font-size: 12px; padding: 7px 16px; }
</style>
</head>

5. **如何衡量一个功能的成功？**
   答题思路：北极星 + 护栏指标 + 长短期平衡，举一个你实习中的真实例子

🎯 你的制胜角度
基于你之前在「字节跳动产品面」被追问假设检验的经历，这次主动讲出：
- 校园二手平台的信任体系设计 → 体现你对 C 端用户心智的理解
- 实习中的 A/B 测试 → 这次准备好讲清楚 sample size 和 p 值
- 把"小红书种草链路"的思考迁移过来 → 体现跨产品的思辨

⚠️ 注意弱项
- 上次面试被追问假设检验细节时回答不够深入 —— 重点复习 A/B 测试的统计学基础
- 对 B 端 / 商业化产品的理解偏弱 —— 准备 1-2 个关于商业变现的思考案例
- 回答普遍偏长 —— 练习用 STAR 框架在 90 秒内讲清楚一个案例

📝 实战练习题
**你是抖音电商团队的 PM，现在发现"购物车转化率"比行业基准低 15%，你会如何定位问题并制定改进方案？**
提示：先拆漏斗（曝光→点击→加购→下单→支付），分别看每一步的转化率，找出洼地；再做用户访谈 + 数据看行为差异；形成假设后用 A/B 测试验证。`;

function simulateUpload(type) {
  if (type === 'jd') {
    state.jdText = '【岗位：产品经理实习生 @ 字节跳动】\n负责抖音创作者生态相关功能的产品设计与优化：\n• 深入理解创作者需求，提出数据驱动的产品方案\n• 参与从需求定义、方案设计到上线迭代的全流程\n• 通过 A/B 测试等方式验证假设、衡量效果\n\n任职要求：\n• 本科及以上学历，在校学生，每周到岗不少于 4 天\n• 具备较强的逻辑思维和数据分析能力\n• 熟悉 SQL、Figma / Axure 等工具\n• 对短视频、内容生态有深刻理解者优先';
    showToast('✓ 已解析 字节-抖音PM实习JD.pdf');
  } else if (type === 'prep-jd') {
    state.prepJd = '【岗位：产品经理实习生 @ 字节跳动】\n负责抖音创作者生态相关功能的产品设计与优化，涉及创作者激励体系、涨粉工具、数据看板等方向……';
    showToast('✓ 已解析 字节-抖音PM实习JD.pdf');
  } else {
    state.resumeFileName = '张三_简历_v3.pdf';
    showToast('✓ 已解析 张三_简历_v3.pdf');
  }
  render();
}
function doAnalyze() {
  if (!state.jdText.trim()) { showToast('请先提供岗位描述'); return; }
  state.analyzeLoading = true; state.analyzeResult = ''; render();
  setTimeout(() => {
    state.analyzeLoading = false;
    state.analyzeResult = MOCK_ANALYZE;
    state.analyzeScore = 8;
    if (state.analyzeCompany) {
      state.records.unshift({
        id: String(Date.now()),
        company: state.analyzeCompany,
        role: state.analyzeRole,
        round: '待投递',
        created_at: new Date().toISOString().slice(0, 10),
        match_score: 8,
        qa_text: '', analyze_result: MOCK_ANALYZE, prep_result: '', jd_text: state.jdText,
      });
      showToast('✓ 分析结果已保存到历史');
    }
    render();
  }, 1800);
}
function saveLog() {
  if (!state.logCompany || !state.logQA) { showToast('请填写公司和面试内容'); return; }
  state.records.unshift({
    id: String(Date.now()),
    company: state.logCompany,
    role: state.logRole,
    round: state.logRound,
    created_at: new Date().toISOString().slice(0, 10),
    match_score: null,
    qa_text: state.logQA, analyze_result: '', prep_result: '', jd_text: '',
  });
  state.logCompany = ''; state.logRole = ''; state.logQA = '';
  showToast('✓ 面试记录已保存');
  render();
}
function doPrep() {
  if (!state.prepJd.trim()) { showToast('请先提供岗位描述'); return; }
  state.prepLoading = true; state.prepResult = ''; render();
  setTimeout(() => {
    state.prepLoading = false;
    state.prepResult = MOCK_PREP;
    render();
  }, 2200);
}
function setFilter(f) { state.filter = f; state.selectedRecord = null; render(); }
function toggleDetail(id) { state.selectedRecord = state.selectedRecord === id ? null : id; render(); }
function deleteRecord(id) {
  if (!confirm('确认删除这条记录？')) return;
  state.records = state.records.filter(r => r.id !== id);
  if (state.selectedRecord === id) state.selectedRecord = null;
  showToast('已删除');
  render();
}
function escapeHTML(s) {
  return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// ==========================================
// MAIN RENDER
// ==========================================
function render() {
  const root = document.getElementById('app');
  if (!state.loggedIn) {
    root.innerHTML = renderLogin() + renderToast();
    return;
  }
  const pages = { home: renderHome, resume: renderResume, analyze: renderAnalyze,
                  log: renderLog, prep: renderPrep, history: renderHistory };
  const renderFn = pages[state.page] || renderHome;
  root.innerHTML = `<div class="layout">${renderFn()}</div>` + renderToast();

  // Restore cursor position for text inputs (re-rendering breaks focus)
}

render();
</script>
</body>
</html>
